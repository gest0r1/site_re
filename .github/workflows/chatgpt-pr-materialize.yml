name: Materialize backlog on PR
on:
  pull_request:
    branches: [master]
permissions:
  contents: write
jobs:
  materialize:
    if: github.head_ref == 'chatgpt-backlog-posters-sync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt-backlog-posters-sync
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --quiet Pillow PyYAML
      - name: Run embedded materializer
        run: |
          python - <<'PY'
          import base64, zlib, yaml
          p = '.github/workflows/chatgpt-materialize-backlog.yml'
          data = yaml.safe_load(open(p, encoding='utf-8'))
          env = data['jobs']['build']['steps'][3]['env']
          open('/tmp/build.py','wb').write(zlib.decompress(base64.b64decode(env['SCRIPT_B64'])))
          PY
          python /tmp/build.py
      - name: Remove temporary files and commit
        run: |
          rm -f .github/workflows/chatgpt-materialize-backlog.yml
          rm -f .github/workflows/chatgpt-pr-materialize.yml
          rm -f 'беклог-промтов/.materialize-trigger'
          git config user.name 'ChatGPT Backlog Sync'
          git config user.email 'actions@users.noreply.github.com'
          git add --all
          git commit -m 'assets: add backlog prompts and WebP posters'
          git push origin HEAD:chatgpt-backlog-posters-sync
