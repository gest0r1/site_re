name: Materialize backlog text
on:
  pull_request:
    branches: [master]
permissions:
  contents: write
jobs:
  materialize-text:
    if: github.head_ref == 'chatgpt-backlog-posters-sync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt-backlog-posters-sync
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate task files
        env:
          SCRIPT_B64: 
        run: |
          python - <<'PY'
          import os, base64, zlib
          open('/tmp/text-build.py','wb').write(zlib.decompress(base64.b64decode(os.environ['SCRIPT_B64'])))
          PY
          python /tmp/text-build.py
      - name: Commit text package
        run: |
          rm -f .github/workflows/chatgpt-text-materialize.yml
          git config user.name 'ChatGPT Backlog Sync'
          git config user.email 'actions@users.noreply.github.com'
          git add --all
          git commit -m 'docs: add backlog implementation prompts'
          git push origin HEAD:chatgpt-backlog-posters-sync
