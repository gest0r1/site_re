name: Materialize ChatGPT backlog
on:
  push:
    branches: [chatgpt-backlog-posters-sync]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install --quiet Pillow
      - name: Build prompts and posters
        env:
          SCRIPT_B64: 
        run: |
          python - <<'PY'
          import os,base64,zlib
          open('/tmp/build.py','wb').write(zlib.decompress(base64.b64decode(os.environ['SCRIPT_B64'])))
          PY
          python /tmp/build.py
      - name: Commit
        run: |
          git config user.name "ChatGPT Backlog Sync"
          git config user.email "actions@users.noreply.github.com"
          git add --all -- 'беклог-промтов' '.github/workflows/chatgpt-materialize-backlog.yml'
          git commit -m "assets: add backlog prompts and WebP posters"
          git push origin HEAD:chatgpt-backlog-posters-sync
